apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: odh-gateway
  namespace: opendatahub
  labels:
    app.kubernetes.io/name: odh-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: opendatahub-operator
  annotations:
    opendatahub.io/managed: "true"
spec:
  gatewayClassName: istio
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    hostname: "*.{{ .spec.domain }}"
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            opendatahub.io/gateway-enabled: "true"
  - name: https
    port: 443
    protocol: HTTPS
    hostname: "*.{{ .spec.domain }}"
    tls:
      mode: Terminate
      certificateRefs:
      - name: odh-gateway-tls-secret
        kind: Secret
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            opendatahub.io/gateway-enabled: "true" 